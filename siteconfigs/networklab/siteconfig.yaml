---
# Networklab site config: SNO + 2 workers on sushy-lab VMs.
#
# Prerequisites:
#   - Sushy emulator running (see https://github.com/ngner/sushy-lab)
#   - VMs created with sushy-lab/vms/create-vms.sh (BASENAME=networklab)
#   - bmh-secret created in the namespace with Sushy credentials
#   - DNS records pushed to your DNS server for networklab.example.com
#
# CHANGE: replace <SUSHY_HOST>, domain UUIDs, and VIPs to match your
# sushy-lab environment. The domain UUIDs are printed by create-vms.sh
# and can be queried via:
#   curl http://<SUSHY_HOST>:8000/redfish/v1/Systems/ | jq .
apiVersion: ran.openshift.io/v1
kind: SiteConfig
metadata:
  name: "networklab"
  namespace: "networklab"
spec:
  baseDomain: "testing"
  pullSecretRef:
    name: "pull-secret-workload-clusters"
  clusterImageSetNameRef: "networklab-imageset"
  sshPublicKey: "ssh-rsa blashasdfjjkjasdkfjasf example@example.com"
  clusters:
  - clusterName: "networklab"
    networkType: "OVNKubernetes"
    clusterLabels:
      vendor: OpenShift
      common: "true"
      cluster-group: lab
      cloud: BareMetal
    clusterNetwork:
    - cidr: 10.128.0.0/14
      hostPrefix: 23
    serviceNetwork:
    - 172.30.0.0/16
    # CHANGE: set these to free IPs on your br0 LAN subnet
    apiVIP: 192.168.188.65
    ingressVIP: 192.168.188.66
    nodes:
    - hostName: "master-0..networklab.internal.nickday.biz"
      role: "master"
      rootDeviceHints:
        deviceName: /dev/vda
      bmcAddress: redfish-virtualmedia+http://192.168.188.55:8000/redfish/v1/Systems/1634ca02-c6e5-40cd-806f-592b993a9459
      bmcCredentialsName:
        name: "bmh-secret"
      bootMACAddress: "aa:aa:aa:aa:aa:01"
      bootMode: "UEFI"
      nodeNetwork:
        interfaces:
        - macAddress: "aa:aa:aa:aa:aa:01"
          name: enp1s0
        config:
          dns-resolver:
            config:
              server:
              - 192.168.168.1
          interfaces:
          - name: enp1s0
            type: ethernet
            state: up
            ipv4:
              enabled: true
              dhcp: true
    - hostName: "worker-0..networklab.internal.nickday.biz"
      role: "worker"
      rootDeviceHints:
        deviceName: /dev/vda
      bmcAddress: redfish-virtualmedia+http://192.168.188.55:8000/redfish/v1/Systems/6762b0e8-0b2a-4ef1-bfad-efaad6f26e1d
      bmcCredentialsName:
        name: "bmh-secret"
      bootMACAddress: "aa:aa:aa:aa:aa:02"
      bootMode: "UEFI"
      nodeNetwork:
        interfaces:
        - macAddress: "aa:aa:aa:aa:aa:02"
          name: enp1s0
        config:
          dns-resolver:
            config:
              server:
              - 192.168.168.1
          interfaces:
          - name: enp1s0
            type: ethernet
            state: up
            ipv4:
              enabled: true
              dhcp: true
    - hostName: "worker-1..networklab.internal.nickday.biz"
      role: "worker"
      rootDeviceHints:
        deviceName: /dev/vda
      bmcAddress: redfish-virtualmedia+http://192.168.188.55:8000/redfish/v1/Systems/36c969e8-a8e1-4158-b1fc-9edd7198fb03
      bmcCredentialsName:
        name: "bmh-secret"
      bootMACAddress: "aa:aa:aa:aa:aa:03"
      bootMode: "UEFI"
      nodeNetwork:
        interfaces:
        - macAddress: "aa:aa:aa:aa:aa:03"
          name: enp1s0
        config:
          dns-resolver:
            config:
              server:
              - 192.168.168.1
          interfaces:
          - name: enp1s0
            type: ethernet
            state: up
            ipv4:
              enabled: true
              dhcp: true
