        interfaces:
        - macAddress: 1E:C7:71:E0:00:26
          name: ens3f0
        - macAddress: 1E:C7:71:E0:00:27
          name: ens3f1
        config:
          dns-resolver:
            config:
              server:
              - 198.51.100.23
              - 198.51.100.24
          interfaces:
          - name: bond0
            type: bond
            state: up
            ipv4:
              enabled: false
            ipv6:
              enabled: false
            link-aggregation:
              mode: balance-xor
              options:
                xmit_hash_policy: "vlan+srcmac"
              port:
              - ens3f0
              - ens3f1
            mtu: 9000
          - name: bond0.3111
            type: vlan
            state: up
            mtu: 1500
            vlan:
              base-iface: bond0
              id: 3111
            ipv4:
              enabled: true
              address:
                - ip: 192.0.2.14
                  prefix-length: 27
              dhcp: false
          routes:
            config:
            - destination: 0.0.0.0/0
              next-hop-address: 192.0.2.1
              next-hop-interface: bond0.3111
