# Example CUDN with a descriptive application name.
# Demonstrates that CUDNs can use meaningful names rather than just VLAN IDs.
apiVersion: k8s.ovn.org/v1
kind: ClusterUserDefinedNetwork
metadata:
  name: bond0-application-data
spec:
  namespaceSelector:
    matchLabels:
      net.io/vlan-300-access: "true"
  network:
    topology: Localnet
    localnet:
      vlan:
        mode: Access
        access:
          id: 300
      role: Secondary
      physicalNetworkName: bond0-ovn-trunk-net
      mtu: 8900
      ipam:
        mode: Disabled
