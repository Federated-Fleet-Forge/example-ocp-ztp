# Default values for baremetal-network-tester.
# Customise for your environment: add CSV files under files/<cluster>/
# and configure statefulSets below to mount and execute them.

replicaCount: 1

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

clusterRole:
  name: baremetal-network-tester

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

